name: PR Quality Gates

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: MyPy
        run: mypy src

      - name: Pytest
        run: pytest

  worker-quality:
    name: Worker Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.6.0"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install Dependencies
        run: npm ci --include=optional

      - name: Ensure Rollup Linux Native Binary
        run: |
          if ! node -e "require.resolve('@rollup/rollup-linux-x64-gnu')" >/dev/null 2>&1; then
            ROLLUP_VERSION="$(node -p "require('rollup/package.json').version")"
            npm install --no-save "@rollup/rollup-linux-x64-gnu@${ROLLUP_VERSION}"
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format Check
        run: npm run format:check

      - name: Test
        run: npm run test -- --passWithNoTests
